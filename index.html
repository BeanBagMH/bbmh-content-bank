<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBMh Content Bank</title>
    <style>
      body { margin: 0; background: #fcfaf9; }
      .initial-loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: serif;
        font-style: italic;
        color: #e61e6e;
      }
    </style>
    <script>
      console.log('BBMh: HTML script running');
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML = '<div style="color:red; padding:40px; font-family:sans-serif;"><h1>CRITICAL ERROR</h1><p>' + msg + '</p><p>' + url + ' L:' + line + '</p></div>';
      };
      // Simple visual confirmation
      window.addEventListener('DOMContentLoaded', () => {
        document.body.style.backgroundColor = '#fcfaf9';
        console.log('BBMh: DOM Loaded');
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">Connecting to Strategic Sanctuary...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
